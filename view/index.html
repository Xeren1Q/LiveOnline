<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Player</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen">

  <div class="flex flex-col lg:flex-row gap-4 p-4">

    <!-- Player Section -->
    <div class="flex-1">
      <video id="video" class="w-full rounded-lg"></video>

      <!-- Controls -->
      <div class="mt-3 space-y-2">
        <input id="progress" type="range" value="0" class="w-full">

        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2">
            <button id="playPause" class="bg-red-600 px-3 py-1 rounded">Play</button>
            <button id="fullscreen" class="bg-gray-700 px-3 py-1 rounded">⛶</button>
          </div>

          <div class="flex items-center gap-2">
            <select id="speed" class="bg-gray-800 px-2 py-1 rounded">
              <option value="0.5">0.5x</option>
              <option value="1" selected>1x</option>
              <option value="2">2x</option>
              <option value="3">3x</option>
              <option value="4">4x</option>
              <option value="5">5x</option>
            </select>
            <input id="volume" type="range" min="0" max="1" step="0.01" value="1">
            <span id="time" class="text-sm">0:00 / 0:00</span>
          </div>
        </div>
      </div>

      <!-- Upload Local -->
      <div id="dropzone" class="mt-4 border-2 border-dashed border-gray-600 p-6 text-center rounded-lg cursor-pointer hover:border-red-500">
        <p>Drag & Drop video atau klik upload</p>
        <input type="file" id="upload" accept="video/*" class="hidden">
      </div>

      <!-- Upload via Link -->
      <div class="mt-4 flex gap-2">
        <input id="videoURL" type="text" placeholder="Masukkan link video (mp4, webm, dll)" class="flex-1 px-3 py-2 rounded bg-gray-800">
        <button id="addURL" class="bg-blue-600 px-4 py-2 rounded">Upload</button>
      </div>
    </div>

    <!-- Playlist -->
    <div class="w-full lg:w-80 bg-gray-900 p-3 rounded-lg">
      <h2 class="text-lg mb-3">Playlist</h2>
      <ul id="playlist" class="space-y-2"></ul>
    </div>
  </div>
</body>
<script src="/js/index.js"></script>
</html>
